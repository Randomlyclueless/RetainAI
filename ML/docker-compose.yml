version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: retainai-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: retainai-cache
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: retainai-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow

  api:
    build: .
    container_name: retainai-api
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgresql://admin:password@db:5432/churn_db
      - REDIS_HOST=redis
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - db
      - redis
      - mlflow

  frontend:
    build: ./frontend
    container_name: retainai-ui
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  mlflow_data:
